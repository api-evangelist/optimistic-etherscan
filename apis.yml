aid: optimistic-etherscan
name: Optimism Etherscan
description: >-
  Optimism Etherscan is the official blockchain explorer and API platform for the Optimism L2 network
  (OP Mainnet, chain ID 10). It provides REST APIs for querying Optimism transactions, token events,
  smart contract source code, account balances, block data, and OP Mainnet statistics. API subscriptions
  have migrated to Etherscan API V2, enabling a single API key to access Optimism alongside 60+ EVM
  chains. The free tier covers select chains with 3 calls/second and 100,000 calls/day; paid plans
  start at $49/month for full multichain access.
