apis:
  - aid: optimistic-etherscan:optimistic-etherscan
    name: Optimism Etherscan API
    description: >-
      The Optimism Etherscan API provides developer access to OP Mainnet blockchain data via REST
      endpoints. Modules cover accounts (balances, transaction lists, token transfers), contracts
      (ABI, source code, verification), transactions (status, receipts, internal txs), blocks (rewards,
      countdowns, timestamps), tokens (ERC-20/ERC-721 balances, supply, holders), stats (OP supply,
      gas oracle, network statistics), and a Geth proxy for raw JSON-RPC calls. Use chainid=10 with
      Etherscan API V2 for unified multichain access.
    humanURL: https://docs.optimism.etherscan.io/
    baseURL: https://api-optimistic.etherscan.io/api
