        description: Maximum requests per second on the Advanced tier
        name: rate_limit
        type: rate
        metric: requests_per_second
        limit: 20
        timeFrame: second
        geo: global
        domains:
          - https://api-optimistic.etherscan.io/api
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: All Supported Chains
      - name: API PRO Endpoints
      - name: Escalated Support
      - name: Optimism Etherscan API
  - id: optimistic-etherscan-professional
    name: Professional
    type: paid
    description: >-
      Professional tier with 30 calls/second and up to 1,000,000 API calls/day. Full PRO access
