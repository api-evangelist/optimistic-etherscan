  - id: optimistic-etherscan-enterprise
    name: Enterprise
    type: enterprise
    description: >-
      Custom-negotiated enterprise tier with unmetered limits, dedicated infrastructure, SLA backing,
      and dedicated support for large-scale Optimism blockchain data consumers.
    entries:
      - label: API Calls Per Day
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_calls_per_day
        type: quota
        metric: requests
        limit: -1
        timeFrame: day
        geo: configurable
        domains:
          - https://api-optimistic.etherscan.io/api
        unit: 1
        price: custom
        userMultiplied: false
      - label: Rate Limit
        description: Negotiated burst and steady-state rate
        name: rate_limit
        type: rate
        metric: requests_per_second
        limit: -1
        timeFrame: second
        geo: configurable
        domains:
          - https://api-optimistic.etherscan.io/api
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Unlimited / Negotiated Volume
      - name: Dedicated Infrastructure
      - name: Contractual SLA
      - name: 24/7 Dedicated Support
      - name: Security & Compliance Review
      - name: Dedicated Account Manager
      - name: API PRO Endpoints
      - name: Optimism Etherscan API
